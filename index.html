<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Notes App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 800px;
            width: 100%;
            padding: 30px;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 2.5em;
        }

        .input-section {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        #noteInput {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        #noteInput:focus {
            outline: none;
            border-color: #667eea;
        }

        #addBtn {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        #addBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        #addBtn:active {
            transform: translateY(0);
        }

        .notes-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
        }

        .note {
            background: #fefef9;
            border-left: 4px solid #667eea;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
            animation: slideIn 0.3s ease-out;
        }

        .note:hover {
            transform: translateY(-4px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .note-text {
            color: #333;
            font-size: 1em;
            line-height: 1.5;
            margin-bottom: 12px;
            word-wrap: break-word;
        }

        .note-date {
            font-size: 0.85em;
            color: #999;
            margin-bottom: 10px;
        }

        .note-actions {
            display: flex;
            gap: 8px;
        }

        .btn-small {
            flex: 1;
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-edit {
            background: #667eea;
            color: white;
        }

        .btn-edit:hover {
            background: #5568d3;
        }

        .btn-delete {
            background: #ff6b6b;
            color: white;
        }

        .btn-delete:hover {
            background: #ee5a52;
        }

        .empty-state {
            text-align: center;
            color: #999;
            padding: 40px 20px;
            font-size: 1.1em;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 30px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            animation: modalSlideIn 0.3s ease-out;
        }

        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal-content h2 {
            color: #333;
            margin-bottom: 20px;
        }

        .modal-content textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1em;
            resize: vertical;
            min-height: 120px;
            margin-bottom: 20px;
        }

        .modal-content textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
        }

        .modal-actions button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .modal-actions .btn-save {
            background: #667eea;
            color: white;
        }

        .modal-actions .btn-save:hover {
            background: #5568d3;
        }

        .modal-actions .btn-cancel {
            background: #e0e0e0;
            color: #333;
        }

        .modal-actions .btn-cancel:hover {
            background: #d0d0d0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 Notes App</h1>
        
        <div class="input-section">
            <input 
                type="text" 
                id="noteInput" 
                placeholder="Add a new note..." 
                autocomplete="off"
            >
            <button id="addBtn">Add Note</button>
        </div>

        <div id="notesContainer" class="notes-container">
            <div class="empty-state">No notes yet. Create your first note!</div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <h2>Edit Note</h2>
            <textarea id="editInput"></textarea>
            <div class="modal-actions">
                <button class="btn-save" onclick="saveEdit()">Save</button>
                <button class="btn-cancel" onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        let notes = [];
        let editingIndex = -1;

        // Load notes from localStorage
        function loadNotes() {
            const saved = localStorage.getItem('notes');
            if (saved) {
                notes = JSON.parse(saved);
                renderNotes();
            }
        }

        // Save notes to localStorage
        function saveNotesToStorage() {
            localStorage.setItem('notes', JSON.stringify(notes));
        }

        // Add new note
        function addNote() {
            const input = document.getElementById('noteInput');
            const text = input.value.trim();

            if (text === '') {
                alert('Please enter some text for your note!');
                return;
            }

            const note = {
                id: Date.now(),
                text: text,
                date: new Date().toLocaleString()
            };

            notes.unshift(note);
            saveNotesToStorage();
            renderNotes();
            input.value = '';
            input.focus();
        }

        // Delete note
        function deleteNote(id) {
            if (confirm('Are you sure you want to delete this note?')) {
                notes = notes.filter(note => note.id !== id);
                saveNotesToStorage();
                renderNotes();
            }
        }

        // Open edit modal
        function openEditModal(id) {
            editingIndex = notes.findIndex(note => note.id === id);
            const note = notes[editingIndex];
            document.getElementById('editInput').value = note.text;
            document.getElementById('editModal').classList.add('active');
            document.getElementById('editInput').focus();
        }

        // Close edit modal
        function closeModal() {
            document.getElementById('editModal').classList.remove('active');
            editingIndex = -1;
        }

        // Save edited note
        function saveEdit() {
            const newText = document.getElementById('editInput').value.trim();

            if (newText === '') {
                alert('Note cannot be empty!');
                return;
            }

            notes[editingIndex].text = newText;
            notes[editingIndex].date = new Date().toLocaleString();
            saveNotesToStorage();
            renderNotes();
            closeModal();
        }

        // Render all notes
        function renderNotes() {
            const container = document.getElementById('notesContainer');

            if (notes.length === 0) {
                container.innerHTML = '<div class="empty-state">No notes yet. Create your first note!</div>';
                return;
            }

            container.innerHTML = notes.map(note => `
                <div class="note">
                    <div class="note-date">${note.date}</div>
                    <div class="note-text">${escapeHtml(note.text)}</div>
                    <div class="note-actions">
                        <button class="btn-small btn-edit" onclick="openEditModal(${note.id})">Edit</button>
                        <button class="btn-small btn-delete" onclick="deleteNote(${note.id})">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Event listeners
        // tr eg
        document.getElementById('addBtn').addEventListener('click', addNote);
        document.getElementById('noteInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                addNote();
            }
        });

        // Close modal when clicking outside
        document.getElementById('editModal').addEventListener('click', (e) => {
            if (e.target.id === 'editModal') {
                closeModal();
            }
        });

        // Initialize
        loadNotes();
    </script>
</body>
</html>
